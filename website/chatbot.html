<style>
#ph-chat-btn{
position:fixed;
bottom:20px;
right:20px;
width:70px;
height:70px;
border-radius:50%;
background:#2e7d32;
color:white;
border:none;
font-size:30px;
cursor:pointer;
z-index:999999999;
}

#ph-chat-container{
position:fixed;
bottom:100px;
right:20px;
width:360px;
height:520px;
background:white;
border-radius:15px;
overflow:hidden;
display:flex;
flex-direction:column;
z-index:999999999;
font-family:Arial;
box-shadow:0 5px 20px rgba(0,0,0,0.4);
}

#ph-chat-header{
background:#2e7d32;
color:white;
padding:15px;
font-size:20px;
font-weight:bold;
}

#ph-chat-messages{
flex:1;
padding:10px;
overflow-y:auto;
background:#f5f5f5;
}

.ph-msg{
margin:10px 0;
padding:10px;
border-radius:10px;
max-width:80%;
}

.user-msg{
background:#c8e6c9;
margin-left:auto;
}

.bot-msg{
background:white;
border:1px solid #ddd;
}

#ph-chat-input-area{
display:flex;
border-top:1px solid #ddd;
}

#ph-chat-input{
flex:1;
padding:12px;
border:none;
outline:none;
}

#ph-send-btn{
background:#2e7d32;
color:white;
border:none;
padding:0 20px;
cursor:pointer;
}
</style>

<div id="ph-chat-container">

<div id="ph-chat-header">
🌾 PriceHarvest AI
</div>

<div id="ph-chat-messages">

<div class="ph-msg bot-msg">
Hello! I’m PriceHarvest AI 🌾
</div>

</div>

<div id="ph-chat-input-area">

<input
type="text"
id="ph-chat-input"
placeholder="Ask something..."
>

<button id="ph-send-btn">
Send
</button>

</div>

</div>

<script>

const sendBtn =
document.getElementById("ph-send-btn");

const input =
document.getElementById("ph-chat-input");

const messages =
document.getElementById("ph-chat-messages");

function addMessage(text,type){

const msg =
document.createElement("div");

msg.classList.add("ph-msg");
msg.classList.add(type);

msg.innerHTML=text;

messages.appendChild(msg);

messages.scrollTop=
messages.scrollHeight;

}

async function askAI(message){

const response = await fetch(
`https://generativelanguage.googleapis.com/v1beta/models/gemini-flash-latest:generateContent?key=AIzaSyAmfspr7UGkYLZ9flfNUJ-w8ngRfNubmds`,
{
method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
contents:[
{
parts:[
{
text:"Reply shortly: "+message
}
]
}
]
})

}
);

const data =
await response.json();

console.log(data);

return data.candidates[0]
.content.parts[0].text;

}

async function sendMessage(){

const text=input.value.trim();

if(!text) return;

addMessage(text,"user-msg");

input.value="";

try{

const reply=
await askAI(text);

addMessage(reply,"bot-msg");

}

catch(error){

addMessage(
"AI Error",
"bot-msg"
);

console.log(error);

}

}

sendBtn.onclick=
sendMessage;

</script>
